<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КоинКликер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="screen-auth" class="screen active">
  <div class="auth-wrap">
    <div class="auth-logo">🪙</div>
    <h1 class="auth-title">КоинКликер</h1>
    <div class="auth-tabs">
      <button class="atab active" data-tab="login">Войти</button>
      <button class="atab" data-tab="reg">Регистрация</button>
    </div>
    <div id="tab-login" class="atab-body active">
      <input id="l-user" type="text" placeholder="Никнейм" maxlength="20" autocomplete="username">
      <input id="l-pass" type="password" placeholder="Пароль" maxlength="40" autocomplete="current-password">
      <button class="btn-gold" id="btn-login">Войти</button>
      <div id="l-err" class="msg err"></div>
    </div>
    <div id="tab-reg" class="atab-body">
      <input id="r-user" type="text" placeholder="Никнейм (3–20 символов)" maxlength="20" autocomplete="username">
      <input id="r-pass" type="password" placeholder="Пароль (мин. 4 символа)" maxlength="40" autocomplete="new-password">
      <input id="r-pass2" type="password" placeholder="Повтори пароль" maxlength="40" autocomplete="new-password">
      <button class="btn-gold" id="btn-reg">Создать аккаунт</button>
      <div id="r-err" class="msg err"></div>
      <div id="r-ok" class="msg ok"></div>
    </div>
  </div>
</div>

<!-- ИГРОВОЙ ЭКРАН -->
<div id="screen-game" class="screen">
  <div class="game-layout">

    <!-- Левая панель: статы + апгрейды -->
    <div class="side-panel left-panel">
      <div class="player-card">
        <div class="player-name" id="hdr-name">Игрок</div>
        <div class="player-stat">Кликов: <span id="hdr-clicks">0</span></div>
      </div>
      <div class="upgrades-wrap">
        <div class="panel-title">⬆️ Улучшения</div>
        <div id="upgrades-list"></div>
      </div>
    </div>

    <!-- Центр: монета -->
    <div class="center-panel">
      <div class="coins-display">
        <span class="coins-num" id="coins-num">0</span>
        <span class="coins-label">монет</span>
      </div>
      <div class="cpc-display">+<span id="cpc">1</span> за клик</div>
      <div class="coin-area">
        <div id="particles"></div>
        <button id="coin-btn" class="coin-btn">
          <span id="coin-face">🪙</span>
        </button>
      </div>
      <div class="bottom-nav">
        <button class="nav-btn" id="nav-lb">🏆<span>Лидеры</span></button>
        <button class="nav-btn" id="nav-skins">🎨<span>Скины</span></button>
        <button class="nav-btn" id="nav-settings">⚙️<span>Настройки</span></button>
        <button class="nav-btn danger" id="nav-logout">🚪<span>Выйти</span></button>
      </div>
    </div>

    <!-- Правая панель: последние события -->
    <div class="side-panel right-panel">
      <div class="panel-title">📋 Активность</div>
      <div id="activity-log" class="activity-log"></div>
    </div>

  </div>
</div>

<!-- ЛИДЕРБОРД -->
<div id="screen-lb" class="screen">
  <div class="modal-wrap">
    <div class="modal-box">
      <div class="modal-header">
        <h2>🏆 Таблица лидеров</h2>
        <button class="close-btn" data-back="game">✕</button>
      </div>
      <div class="lb-filters">
        <button class="filter-btn active" data-sort="coins">По монетам</button>
        <button class="filter-btn" data-sort="clicks">По кликам</button>
      </div>
      <div id="lb-list" class="lb-list"></div>
    </div>
  </div>
</div>

<!-- СКИНЫ -->
<div id="screen-skins" class="screen">
  <div class="modal-wrap">
    <div class="modal-box">
      <div class="modal-header">
        <h2>🎨 Магазин скинов</h2>
        <button class="close-btn" data-back="game">✕</button>
      </div>
      <div class="modal-coins">У тебя: <strong id="shop-coins">0</strong> монет</div>
      <div id="skins-grid" class="skins-grid"></div>
    </div>
  </div>
</div>

<!-- НАСТРОЙКИ -->
<div id="screen-settings" class="screen">
  <div class="modal-wrap">
    <div class="modal-box">
      <div class="modal-header">
        <h2>⚙️ Настройки</h2>
        <button class="close-btn" data-back="game">✕</button>
      </div>
      <div class="settings-section">
        <div class="settings-label">Тема</div>
        <div class="theme-row">
          <button class="theme-pill" data-theme="dark">🌑 Тёмная</button>
          <button class="theme-pill" data-theme="light">☀️ Светлая</button>
          <button class="theme-pill" data-theme="green">🌿 Зелёная</button>
          <button class="theme-pill" data-theme="purple">🔮 Фиолет.</button>
          <button class="theme-pill" data-theme="red">🔴 Красная</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Аккаунт</div>
        <div class="settings-info" id="settings-info"></div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Опасная зона</div>
        <button class="btn-danger" id="btn-logout2">🚪 Выйти из аккаунта</button>
      </div>
    </div>
  </div>
</div>

<!-- ДИАЛОГ ПОДТВЕРЖДЕНИЯ -->
<div id="confirm-overlay" class="confirm-overlay hidden">
  <div class="confirm-box">
    <div class="confirm-text" id="confirm-text">Ты уверен?</div>
    <div class="confirm-btns">
      <button class="btn-gold" id="confirm-yes">Да</button>
      <button class="btn-cancel" id="confirm-no">Отмена</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
